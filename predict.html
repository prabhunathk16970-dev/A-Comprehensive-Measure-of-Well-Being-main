<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict HDI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>

    <h2>🌍 HDI Predictor</h2>

    <nav>
        <a href="/">Home</a>
        <a href="/predict">Predict</a>
        <a href="/about">About</a>
    </nav>

</header>

<div class="container">

    <h1>Predict Human Development Index</h1>

    <form action="/predict" method="POST">

        <label><b>Life Expectancy (Years)</b></label>

        <input
            type="number"
            name="life"
            min="20"
            max="90"
            step="0.01"
            value="75"
            placeholder="Enter Life Expectancy"
            required
        >

        <label><b>Expected Years of Schooling</b></label>

        <input
            type="number"
            name="expected"
            min="1"
            max="25"
            step="0.01"
            value="16"
            placeholder="Enter Expected Years of Schooling"
            required
        >

        <label><b>Mean Years of Schooling</b></label>

        <input
            type="number"
            name="mean"
            min="1"
            max="18"
            step="0.01"
            value="12"
            placeholder="Enter Mean Years of Schooling"
            required
        >

        <label><b>Gross National Income (PPP $)</b></label>

        <input
            type="number"
            name="gni"
            min="100"
            max="150000"
            step="0.01"
            value="30000"
            placeholder="Enter GNI Per Capita"
            required
        >

        <button type="submit">
            Predict HDI
        </button>

    </form>

</div>

</body>
</html>
